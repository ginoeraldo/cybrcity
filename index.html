<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybrcity</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --panel:#f4f4f6;
    --ink:#0E0F13;
    --ink-soft:#6b6f7b;
    --line:rgba(14,15,19,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);overflow-x:hidden;padding-top:72px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

  .site-header{position:fixed;top:0;left:0;right:0;height:72px;z-index:100;background:#0E0F13;display:flex;align-items:center;padding:0 32px;}
  .header-mark{color:#fff;font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;}

  .lang-switch{position:relative;margin-left:auto;}
  .lang-current{background:#0E0F13;border:1px solid rgba(255,255,255,0.7);border-radius:8px;display:flex;align-items:center;gap:7px;cursor:pointer;padding:6px 12px 6px 14px;transition:border-color 0.15s ease;}
  .lang-current:hover{border-color:#fff;}
  .lang-current .lang-code{color:#fff;font-family:'Chakra Petch',sans-serif;font-size:11px;font-weight:400;letter-spacing:0.18em;}
  .lang-current .lang-chevron{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.2s ease;}
  .lang-switch.open .lang-current .lang-chevron{transform:rotate(180deg);}
  .lang-options{position:absolute;top:100%;right:0;margin-top:12px;background:#fff;border-radius:14px;box-shadow:0 16px 40px rgba(14,15,19,0.14);padding:6px;min-width:96px;display:flex;flex-direction:column;gap:1px;opacity:0;transform:translateY(-8px) scale(0.97);transform-origin:top right;pointer-events:none;transition:opacity 0.2s ease,transform 0.2s ease;}
  .lang-switch.open .lang-options{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  .lang-options button{background:none;border:none;display:flex;align-items:center;gap:9px;color:var(--ink-soft);font-family:'Chakra Petch',sans-serif;font-size:11px;font-weight:400;letter-spacing:0.14em;cursor:pointer;padding:9px 10px;border-radius:9px;transition:background 0.15s ease,color 0.15s ease;}
  .lang-options button:hover{background:var(--panel);color:var(--ink);}
  .lang-options button.active{color:var(--ink);background:var(--panel);}

  #hero{min-height:100vh;padding:0;background:#0E0F13;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .hero-bg{position:absolute;inset:0;background-image:url('hero-bg.jpg');background-size:cover;background-position:center 30%;filter:brightness(0.42);}
  .hero-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:0 6vw;}
  .wordmark{font-size:clamp(1.6rem,3.5vw,2.6rem);font-weight:600;letter-spacing:-0.01em;color:#ffffff;margin-bottom:28px;text-align:center;max-width:640px;line-height:1.25;}
  .subtext{font-size:clamp(0.95rem,1.6vw,1.15rem);font-weight:400;color:rgba(255,255,255,0.65);text-align:center;max-width:480px;line-height:1.6;}

  .reveal{opacity:0;transform:translateY(28px);transition:opacity 1.1s cubic-bezier(.2,.8,.2,1),transform 1.1s cubic-bezier(.2,.8,.2,1);}
  .reveal.visible{opacity:1;transform:translateY(0);}

  footer{padding:56px 6vw 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg);border-top:1px solid var(--line);}
  .footer-logo{font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);}
  .footer-copy{font-size:12px;color:var(--ink-soft);opacity:0.7;}

  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-mark">Cybrcity</div>
  <div class="lang-switch" id="langSwitch">
    <button type="button" class="lang-current" id="langCurrent">
      <span class="lang-code">EN</span>
      <svg class="lang-chevron" viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg>
    </button>
    <div class="lang-options">
      <button type="button" data-lang="en" class="active">EN</button>
      <button type="button" data-lang="nl">NL</button>
    </div>
  </div>
</header>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1 class="wordmark reveal visible" id="i18n-wordmark">The digital backbone of the physical world.</h1>
    <p class="subtext reveal visible" id="i18n-subtext">Connect assets, managers, service providers and suppliers through a unified digital infrastructure.</p>
  </div>
</section>

<footer>
  <div class="footer-logo">Cybrcity</div>
  <div class="footer-copy" id="i18n-copy">© 2026 Cybrcity. All rights reserved.</div>
</footer>

<script>
  const translations = {
    en:{wordmark:"The digital backbone of the physical world.",subtext:"Connect assets, managers, service providers and suppliers through a unified digital infrastructure.",copy:"© 2026 Cybrcity. All rights reserved."},
    nl:{wordmark:"Het digitale fundament van de fysieke wereld.",subtext:"Verbind assets, beheerders, dienstverleners en leveranciers via één centrale digitale infrastructuur.",copy:"© 2026 Cybrcity. Alle rechten voorbehouden."}
  };
  const langSwitch=document.getElementById('langSwitch');
  const langCurrentCode=document.querySelector('#langCurrent .lang-code');
  function setLang(lang){
    const t=translations[lang];if(!t)return;
    document.getElementById('i18n-wordmark').textContent=t.wordmark;
    document.getElementById('i18n-subtext').textContent=t.subtext;
    document.getElementById('i18n-copy').textContent=t.copy;
    document.querySelectorAll('.lang-options button').forEach(b=>{b.classList.toggle('active',b.dataset.lang===lang);});
    langCurrentCode.textContent=lang.toUpperCase();
    document.documentElement.lang=lang;
  }
  document.getElementById('langCurrent').addEventListener('click',(e)=>{e.stopPropagation();langSwitch.classList.toggle('open');});
  document.querySelectorAll('.lang-options button').forEach(b=>{b.addEventListener('click',()=>{setLang(b.dataset.lang);langSwitch.classList.remove('open');});});
  document.addEventListener('click',(e)=>{if(!langSwitch.contains(e.target)){langSwitch.classList.remove('open');}});
  const io=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');}});},{threshold:0.25});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
</html>
